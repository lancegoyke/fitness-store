name: Django CI

on:
  # Manual re-run for a given ref. Added after #488: a push to main was
  # silently dropped by GitHub (no run of any kind was created for it), so
  # Django CI never ran and the workflow_run-triggered Deploy below never
  # fired — main sat un-deployed with no supported way to re-trigger CI for
  # that commit short of an empty commit or a by-hand deploy. Dispatch this
  # against `main` (or any ref) from the Actions tab or `gh workflow run` to
  # re-run the same jobs; no inputs needed. Keep this even though it has no
  # "normal" callers — it's the recovery path for the next dropped event.
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      # Front-end TEST scaffold only — these never reach the production image,
      # so they should not run Django CI (and thus never trigger a deploy).
      # Everything that DOES ship must stay un-ignored: static/js/** (served
      # via collectstatic), frontend/designer/** and package*.json (inputs to
      # the Dockerfile's island build stage — a designer change with no Python
      # diff still needs a deploy to rebuild the bundle into the image). See
      # .github/workflows/frontend.yml.
      - "frontend/*.test.js"
      - "frontend/README.md"
      - "vitest.config.js"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: ["main"]
    # No front-end paths-ignore here on purpose: deploys key off the *push*
    # trigger above, so gating only needs to happen there. Keeping Django CI
    # running on every PR means it can't get stuck "pending" as a required
    # status check when a PR only touches the front-end test scaffold.
    paths-ignore:
      - "**.md"
      - "docs/**"

# Cancel superseded runs on the same PR branch, but let main runs finish
# so every merge gets its CI + downstream deploy.
concurrency:
  group: django-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    env:
      SECRET_KEY: NotSecureForTesting
      PYTHONUNBUFFERED: 1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      FB_APP_ID: ${{ secrets.FB_APP_ID }}
      FB_SECRET_KEY: ${{ secrets.FB_SECRET_KEY }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      STRIPE_ENDPOINT_SECRET: ${{ secrets.STRIPE_ENDPOINT_SECRET }}
      STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      G_RECAPTCHA_SITE_KEY: test-recaptcha-site-key
      G_RECAPTCHA_SECRET_KEY: test-recaptcha-secret-key
      G_RECAPTCHA_ENDPOINT: https://test-recaptcha-endpoint.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        id: setup_python
        with:
          python-version-file: "pyproject.toml"

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.20"

      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          key: venv-${{ runner.os }}-${{ steps.setup_python.outputs.python-version}}-${{ hashFiles('uv.lock') }}
          path: .venv

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: run system checks
        run: cd app && uv run python manage.py check --deploy

      - name: check for migrations
        run: cd app && uv run python manage.py makemigrations --check

      - name: Run Tests
        run: |
          uv run pytest

  # The main "build" job above runs the full suite on fast, hermetic
  # in-memory SQLite (deliberate — see config/settings/test.py). SQLite
  # can't express PostgreSQL's deferred-constraint checks at all, which is
  # exactly the class of bug that shipped twice (meso 0036/0037 and 0040:
  # "cannot ALTER TABLE ... because it has pending trigger events", only
  # reachable on Postgres with real data — an empty CI/prod DB never hits
  # it). This job runs a real `migrate` from scratch against a Postgres
  # service container and then the Postgres-only regression tests
  # (`@pytest.mark.skipif(connection.vendor != "postgresql", ...)`) — which
  # SKIP under the SQLite job above — so they actually execute somewhere. The
  # SQLite job stays as the fast feedback path and still runs the FULL suite
  # on every push; the two run in parallel.
  postgres:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    services:
      postgres:
        # Match production's major version (docker-compose.production.yml
        # pins `postgres:17-alpine`, matching the Heroku Postgres 17 major
        # this app was migrated from; the dev stack's docker-compose.yml
        # also runs Postgres 17).
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: NotSecureForTesting
      PYTHONUNBUFFERED: 1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      FB_APP_ID: ${{ secrets.FB_APP_ID }}
      FB_SECRET_KEY: ${{ secrets.FB_SECRET_KEY }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      STRIPE_ENDPOINT_SECRET: ${{ secrets.STRIPE_ENDPOINT_SECRET }}
      STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      G_RECAPTCHA_SITE_KEY: test-recaptcha-site-key
      G_RECAPTCHA_SECRET_KEY: test-recaptcha-secret-key
      G_RECAPTCHA_ENDPOINT: https://test-recaptcha-endpoint.com
      # Opts config.settings.test into the real Postgres service container
      # instead of its default in-memory SQLite (config/settings/test.py).
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        id: setup_python
        with:
          python-version-file: "pyproject.toml"

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.20"

      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          key: venv-${{ runner.os }}-${{ steps.setup_python.outputs.python-version}}-${{ hashFiles('uv.lock') }}
          path: .venv

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Migrate from scratch against PostgreSQL
        run: cd app && uv run python manage.py migrate --settings=config.settings.test

      # The Postgres-ONLY tests, not the whole suite. This job briefly ran
      # everything, on the reasoning that the suite is Postgres-clean and
      # parallel jobs cost no extra wall-clock. Both halves were wrong: the
      # job became CI's long pole (~2.5 min -> ~8 min), and on a slower runner
      # it took 15m17s, blew this job's own timeout-minutes, cancelled Django
      # CI, and left a merged commit undeployed because Deploy keys off a
      # SUCCESSFUL conclusion. Locally the same run is ~3.5 min — CI is 3-5x
      # slower here, straddling the timeout, so it failed intermittently.
      #
      # migrate-from-scratch above + the deferred-constraint regression tests
      # is the floor that keeps THAT class of bug catchable, which is the
      # whole reason this job exists. The SQLite job beside it still runs the
      # full suite on every push. If broad Postgres coverage is wanted later,
      # give it its own schedule (nightly) rather than the deploy path.
      - name: Run the PostgreSQL-only tests
        run: |
          uv run pytest app/store_project/meso/tests/test_migration_0040_pending_triggers.py
